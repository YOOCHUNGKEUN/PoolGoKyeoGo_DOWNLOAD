      border-radius: 12px;
      transition: background-color 0.2s ease, transform 0.1s ease;
      box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
    }

    /* 버튼에 마우스를 올리거나 누를 때 효과 */
